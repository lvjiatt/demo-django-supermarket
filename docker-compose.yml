version: '3.8'

services:
  # MySQL数据库服务
  db:
    image: mysql:8.0
    container_name: supermarket_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: demo_django_supermarket
      MYSQL_USER: admin
      MYSQL_PASSWORD: 123456
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - supermarket_network

  # Django应用服务
  web:
    build: .
    container_name: supermarket_web
    restart: always
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8001"
    volumes:
      - .:/app
    ports:
      - "8001:8001"
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=demo_django_supermarket
      - DB_USER=admin
      - DB_PASSWORD=123456
    networks:
      - supermarket_network

volumes:
  mysql_data:

networks:
  supermarket_network:
    driver: bridge
